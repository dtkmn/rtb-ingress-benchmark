x-benchmark-kafka: &benchmark-kafka
  cpus: ${BENCHMARK_KAFKA_CPUS:-2.0}
  mem_limit: ${BENCHMARK_KAFKA_MEMORY:-1g}

x-benchmark-receiver: &benchmark-receiver
  cpus: ${BENCHMARK_RECEIVER_CPUS:-2.0}
  mem_limit: ${BENCHMARK_RECEIVER_MEMORY:-768m}

services:

  # Kafka in KRaft mode (no ZooKeeper needed!)
  kafka:
    <<: *benchmark-kafka
    image: confluentinc/cp-kafka:7.8.3
    ports:
      - "9092:9092"
    environment:
      # KRaft mode configuration
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://localhost:9092,INTERNAL://kafka:29092'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
      KAFKA_DEFAULT_REPLICATION_FACTOR: ${BENCHMARK_KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: ${BENCHMARK_KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_MIN_INSYNC_REPLICAS: ${BENCHMARK_KAFKA_TOPIC_MIN_ISR:-1}
      KAFKA_NUM_NETWORK_THREADS: ${BENCHMARK_KAFKA_BROKER_NUM_NETWORK_THREADS:-8}
      KAFKA_NUM_IO_THREADS: ${BENCHMARK_KAFKA_BROKER_NUM_IO_THREADS:-8}
      KAFKA_MESSAGE_MAX_BYTES: ${BENCHMARK_KAFKA_TOPIC_MAX_MESSAGE_BYTES:-1048576}
      KAFKA_REPLICA_FETCH_MAX_BYTES: ${BENCHMARK_KAFKA_TOPIC_MAX_MESSAGE_BYTES:-1048576}
      KAFKA_SOCKET_REQUEST_MAX_BYTES: ${BENCHMARK_KAFKA_SOCKET_REQUEST_MAX_BYTES:-104857600}
      KAFKA_LOG_RETENTION_MS: ${BENCHMARK_KAFKA_TOPIC_RETENTION_MS:-86400000}
      KAFKA_LOG_DIRS: '/var/lib/kafka/data'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_HEAP_OPTS: -Xmx512M -Xms256M
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      KAFKA_DLQ_TOPIC: ${KAFKA_DLQ_TOPIC:-bids-dlq}
      BENCHMARK_KAFKA_TOPIC_PARTITIONS: ${BENCHMARK_KAFKA_TOPIC_PARTITIONS:-3}
      BENCHMARK_KAFKA_TOPIC_REPLICATION_FACTOR: ${BENCHMARK_KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      BENCHMARK_KAFKA_TOPIC_MIN_ISR: ${BENCHMARK_KAFKA_TOPIC_MIN_ISR:-1}
      BENCHMARK_KAFKA_TOPIC_RETENTION_MS: ${BENCHMARK_KAFKA_TOPIC_RETENTION_MS:-86400000}
      BENCHMARK_KAFKA_DLQ_RETENTION_MS: ${BENCHMARK_KAFKA_DLQ_RETENTION_MS:-604800000}
      BENCHMARK_KAFKA_TOPIC_MAX_MESSAGE_BYTES: ${BENCHMARK_KAFKA_TOPIC_MAX_MESSAGE_BYTES:-1048576}
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - ./scripts:/scripts
      - kafka_data:/var/lib/kafka/data
    command: >
      bash -c "
      /etc/confluent/docker/run &
      sleep 30 && /scripts/create-kafka-topics.sh;
      wait
      "


  kafdrop:
    image: obsidiandynamics/kafdrop:4.1.0
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: kafka:29092
#      SCHEMAREGISTRY_CONNECT: http://schema-registry:8081
#      JVM_OPTS: -Xms32M -Xmx64M

  # --- NEW OBSERVABILITY STACK ---
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    # Needed for host.docker.internal on Linux, harmless on Mac
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
  
  postgres:
    image: "pgvector/pgvector:pg17" # Use a pgvector-enabled image
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgresData:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- The Application (JVM Version) ---
  # We comment this out by default so we can choose which one to run,
  # or run both to compare side-by-side.
  quarkus-receiver:
    <<: *benchmark-receiver
    image: quarkus-receiver
    build:
      context: ./services/quarkus-receiver
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - BENCHMARK_KAFKA_TOPIC=${BENCHMARK_KAFKA_TOPIC:-bids}
      - BENCHMARK_DELIVERY_MODE=${BENCHMARK_DELIVERY_MODE:-confirm}
      - BENCHMARK_KAFKA_ACKS=${BENCHMARK_KAFKA_ACKS:-1}
      - BENCHMARK_KAFKA_LINGER_MS=${BENCHMARK_KAFKA_LINGER_MS:-10}
      - BENCHMARK_KAFKA_BATCH_BYTES=${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      - BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS=${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      - BENCHMARK_KAFKA_RETRIES=${BENCHMARK_KAFKA_RETRIES:-5}
      - BENCHMARK_KAFKA_RETRY_BACKOFF_MS=${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      - QUARKUS_HTTP_IO_THREADS=${QUARKUS_HTTP_IO_THREADS:-2}
      - JAVA_OPTS=-Xmx512m -Xms128m
    ports:
      - "8070:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s


  # --- The Application (Native Version) ---
  quarkus-receiver-native:
    <<: *benchmark-receiver
    image: quarkus-receiver-native
    build:
      context: ./services/quarkus-receiver
      dockerfile: Dockerfile.native
    environment:
      # This env var overrides the default in application.properties
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - BENCHMARK_KAFKA_TOPIC=${BENCHMARK_KAFKA_TOPIC:-bids}
      - BENCHMARK_DELIVERY_MODE=${BENCHMARK_DELIVERY_MODE:-confirm}
      - BENCHMARK_KAFKA_ACKS=${BENCHMARK_KAFKA_ACKS:-1}
      - BENCHMARK_KAFKA_LINGER_MS=${BENCHMARK_KAFKA_LINGER_MS:-10}
      - BENCHMARK_KAFKA_BATCH_BYTES=${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      - BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS=${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      - BENCHMARK_KAFKA_RETRIES=${BENCHMARK_KAFKA_RETRIES:-5}
      - BENCHMARK_KAFKA_RETRY_BACKOFF_MS=${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      - QUARKUS_HTTP_IO_THREADS=${QUARKUS_HTTP_IO_THREADS:-2}
      - JAVA_OPTS=-Xmx512m -Xms128m
    ports:
      - "8071:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  quarkus-sinker:
    image: quarkus-sinker
    build:
      context: ./services/quarkus-sinker
      dockerfile: Dockerfile
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - BENCHMARK_KAFKA_TOPIC=${BENCHMARK_KAFKA_TOPIC:-bids}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=postgres
      - SINKER_DLQ_ENABLED=${SINKER_DLQ_ENABLED:-false}
      - KAFKA_DLQ_TOPIC=${KAFKA_DLQ_TOPIC:-bids-dlq}
      - JAVA_OPTS=-Xmx512m -Xms128m
    ports:
      - "8074:8080"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  go-receiver:
    <<: *benchmark-receiver
    image: go-receiver
    build:
      context: ./services/go-receiver # Assumes Go app is in a sibling folder
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_LINGER_MS: ${BENCHMARK_KAFKA_LINGER_MS:-10}
      BENCHMARK_KAFKA_BATCH_BYTES: ${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      GOMAXPROCS: ${GOMAXPROCS:-2}
    ports:
      - "8072:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
  
  rust-receiver:
    <<: *benchmark-receiver
    image: rust-receiver
    build:
      context: ./services/rust-receiver
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_LINGER_MS: ${BENCHMARK_KAFKA_LINGER_MS:-10}
      BENCHMARK_KAFKA_BATCH_BYTES: ${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      HTTP_SERVER_WORKERS: ${HTTP_SERVER_WORKERS:-2}
    ports:
      - "8073:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  python-receiver:
    <<: *benchmark-receiver
    image: python-receiver
    build:
      context: ./services/python-receiver
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_LINGER_MS: ${BENCHMARK_KAFKA_LINGER_MS:-10}
      BENCHMARK_KAFKA_BATCH_BYTES: ${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      HTTP_SERVER_WORKERS: ${HTTP_SERVER_WORKERS:-2}
    ports:
      - "8075:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  spring-receiver:
    <<: *benchmark-receiver
    image: spring-receiver
    build:
      context: ./services/spring-receiver
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_LINGER_MS: ${BENCHMARK_KAFKA_LINGER_MS:-10}
      BENCHMARK_KAFKA_BATCH_BYTES: ${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      HTTP_SERVER_WORKERS: ${HTTP_SERVER_WORKERS:-2}
      JAVA_TOOL_OPTIONS: -Xmx512m -Xms128m -Dreactor.netty.ioWorkerCount=${HTTP_SERVER_WORKERS:-2}
    ports:
      - "8076:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  spring-virtual-receiver:
    <<: *benchmark-receiver
    image: spring-virtual-receiver
    build:
      context: ./services/spring-virtual-receiver
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_LINGER_MS: ${BENCHMARK_KAFKA_LINGER_MS:-10}
      BENCHMARK_KAFKA_BATCH_BYTES: ${BENCHMARK_KAFKA_BATCH_BYTES:-131072}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      JAVA_TOOL_OPTIONS: -Xmx512m -Xms128m
    ports:
      - "8078:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  node-receiver:
    <<: *benchmark-receiver
    image: node-receiver
    build:
      context: ./services/node-receiver
      dockerfile: Dockerfile
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      BENCHMARK_KAFKA_TOPIC: ${BENCHMARK_KAFKA_TOPIC:-bids}
      BENCHMARK_DELIVERY_MODE: ${BENCHMARK_DELIVERY_MODE:-confirm}
      BENCHMARK_KAFKA_ACKS: ${BENCHMARK_KAFKA_ACKS:-1}
      BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS: ${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:-5000}
      BENCHMARK_KAFKA_RETRIES: ${BENCHMARK_KAFKA_RETRIES:-5}
      BENCHMARK_KAFKA_RETRY_BACKOFF_MS: ${BENCHMARK_KAFKA_RETRY_BACKOFF_MS:-100}
      HTTP_SERVER_WORKERS: ${HTTP_SERVER_WORKERS:-2}
    ports:
      - "8077:8080"
    depends_on:
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8080/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  grafana_data:
  postgresData:
  kafka_data:
