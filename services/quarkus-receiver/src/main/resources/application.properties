quarkus.http.port=8080
quarkus.http.access-log.enabled=false
quarkus.log.level=INFO

# ======================================================
# DEFAULT (DEV MODE) - Uses In-Memory for fast local dev
# ======================================================
#mp.messaging.outgoing.bid-stream.connector=smallrye-in-memory
#mp.messaging.outgoing.bid-stream.topic=bids

# ======================================================
# PRODUCTION (DOCKER/K8S) - Uses Real Kafka
# ======================================================
# '%prod' activates when running the built JAR or Native executable
kafka.bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
benchmark.delivery.mode=${BENCHMARK_DELIVERY_MODE:confirm}
benchmark.kafka.topic=bids
benchmark.kafka.acks=${BENCHMARK_KAFKA_ACKS:1}
benchmark.kafka.linger.ms=${BENCHMARK_KAFKA_LINGER_MS:10}
benchmark.kafka.batch.bytes=${BENCHMARK_KAFKA_BATCH_BYTES:131072}
benchmark.kafka.request.timeout.ms=${BENCHMARK_KAFKA_REQUEST_TIMEOUT_MS:5000}
benchmark.kafka.send.buffer.bytes=131072
benchmark.kafka.receive.buffer.bytes=131072
