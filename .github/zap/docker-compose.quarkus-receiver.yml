services:
  app:
    image: quarkus-receiver:zap-security-gate
    build:
      context: ${GITHUB_WORKSPACE}/services/quarkus-receiver
      dockerfile: Dockerfile
    environment:
      BENCHMARK_DELIVERY_MODE: http-only
      JAVA_OPTS: -Xmx384m -Xms128m
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/q/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mcp-server:
    depends_on:
      app:
        condition: service_healthy
