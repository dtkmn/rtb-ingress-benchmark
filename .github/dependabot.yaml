version: 2
updates:
  # ── Java services ────────────────────────────────────────────────────────────
  # Each service gets ONE grouped PR per week instead of one PR per dependency.

  - package-ecosystem: "maven"
    directory: "/services/quarkus-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2   # 1 grouped version PR + headroom for a security PR
    groups:
      quarkus-receiver-all:
        patterns: ["*"]

  - package-ecosystem: "maven"
    directory: "/services/quarkus-sinker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      quarkus-sinker-all:
        patterns: ["*"]

  - package-ecosystem: "maven"
    directory: "/services/spring-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      spring-receiver-all:
        patterns: ["*"]

  - package-ecosystem: "maven"
    directory: "/services/spring-virtual-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      spring-virtual-receiver-all:
        patterns: ["*"]

  # ── Other language services ──────────────────────────────────────────────────

  - package-ecosystem: "gomod"
    directory: "/services/go-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      go-receiver-all:
        patterns: ["*"]

  - package-ecosystem: "cargo"
    directory: "/services/rust-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      rust-receiver-all:
        patterns: ["*"]

  - package-ecosystem: "pip"
    directory: "/services/python-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      python-receiver-all:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/services/node-receiver"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      node-receiver-all:
        patterns: ["*"]

  # ── Docker base images ───────────────────────────────────────────────────────
  # Monthly is enough — base image patches are low-urgency for a benchmark harness.
  # Security-relevant base image CVEs are caught by Dependabot security alerts separately.

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/quarkus-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/quarkus-sinker"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/go-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/rust-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/python-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/spring-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/spring-virtual-receiver"
    schedule:
      interval: "monthly"

  - package-ecosystem: "docker"
    directory: "/services/node-receiver"
    schedule:
      interval: "monthly"

  # ── GitHub Actions ───────────────────────────────────────────────────────────

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      actions-all:
        patterns: ["*"]
