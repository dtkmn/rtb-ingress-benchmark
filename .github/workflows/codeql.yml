# Repo-managed CodeQL workflow for the RTB ingress benchmark harness.
# After this lands on the default branch, disable GitHub's UI-managed
# "default setup" CodeQL workflow to avoid duplicate scans.

name: CodeQL

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "results/**"
      - "site/dist/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "docs/**"
      - "results/**"
      - "site/dist/**"
  schedule:
    - cron: "23 4 * * 0"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.label }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: actions
            language: actions
            build-mode: none
          - label: javascript-typescript
            language: javascript-typescript
            build-mode: none
          - label: python
            language: python
            build-mode: none
          - label: rust
            language: rust
            build-mode: none
          - label: go
            language: go
            build-mode: manual
          - label: java-kotlin
            language: java-kotlin
            build-mode: manual

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        if: matrix.language == 'java-kotlin'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v6
        with:
          go-version-file: services/go-receiver/go.mod
          cache-dependency-path: services/go-receiver/go.sum

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Java services for CodeQL
        if: matrix.language == 'java-kotlin'
        run: |
          chmod +x services/quarkus-receiver/mvnw services/quarkus-sinker/mvnw
          ./services/quarkus-receiver/mvnw -B -f services/quarkus-receiver/pom.xml -DskipTests compile
          ./services/quarkus-sinker/mvnw -B -f services/quarkus-sinker/pom.xml -DskipTests compile
          mvn -B -f services/spring-receiver/pom.xml -DskipTests compile
          mvn -B -f services/spring-virtual-receiver/pom.xml -DskipTests compile

      - name: Build Go service for CodeQL
        if: matrix.language == 'go'
        working-directory: services/go-receiver
        run: go build ./...

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
