name: ZAP Receiver Seed Proof

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: Base target reachable from ZAP; seed requests drive POST /bid-request coverage.
        required: true
        default: http://app:8080
        type: string
      baseline_mode:
        description: Use seed first; enforce only after reviewing the seeded receiver baseline.
        required: true
        default: seed
        type: choice
        options:
          - seed
          - enforce
      fail_on_new_findings:
        description: Fail when net-new findings exceed the threshold.
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  zap-security-gate:
    name: Run MCP ZAP receiver seed proof
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out benchmark repo
        uses: actions/checkout@v5

      - name: Run MCP-backed ZAP receiver seed proof
        id: zap_gate
        uses: dtkmn/mcp-zap-server/.github/actions/zap-security-gate@46c3288e79572ad6b7cc33639566463c2719837d
        with:
          target-url: ${{ inputs.target_url }}
          baseline-file: .zap/baselines/quarkus-receiver-bid-request-seed.json
          baseline-mode: ${{ inputs.baseline_mode }}
          seed-requests-file: .zap/seed-requests/quarkus-receiver-bid-request.json
          output-dir: zap-artifacts
          mcp-server-image: ghcr.io/dtkmn/mcp-zap-server@sha256:fbf5af023ad3c72655c608383f4c892b31726128fce427b38a48f9492ff00382
          compose-override-file: .github/zap/docker-compose.quarkus-receiver.yml
          compose-services: app zap mcp-server
          run-active-scan: "false"
          fail-on-new-findings: ${{ inputs.fail_on_new_findings }}
          max-new-findings: "0"
          passive-timeout-seconds: "120"
          spider-timeout-seconds: "240"

      - name: Upload ZAP gate artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-receiver-seed-proof
          path: zap-artifacts/**
          if-no-files-found: warn

      - name: Print gate result
        if: always()
        run: |
          echo "gate-passed=${{ steps.zap_gate.outputs.gate-passed }}"
          echo "baseline-used=${{ steps.zap_gate.outputs.baseline-used }}"
          echo "new-findings=${{ steps.zap_gate.outputs.new-findings }}"
          echo "summary-path=${{ steps.zap_gate.outputs.summary-path }}"
          echo "report-local-path=${{ steps.zap_gate.outputs.report-local-path }}"
