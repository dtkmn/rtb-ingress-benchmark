name: Deploy Benchmark Pages

on:
  workflow_dispatch:
  push:
    paths:
      - "results/**"
      - "site/src/**"
      - "scripts/build_benchmark_site.py"
      - ".github/workflows/benchmark-pages.yml"
      - "docs/BENCHMARK_CONTRACT.md"
      - "docs/BENCHMARK_HISTORY.md"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build benchmark site
        run: python3 scripts/build_benchmark_site.py

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/dist

  deploy:
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
